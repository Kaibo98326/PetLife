<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>PetLife 首頁</title>
<link rel="stylesheet"
	href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" type="text/css"
	th:href="@{/css/ShopPanel.css?v=124}">
</head>

<body>
	<!-- 上層頂端導覽 -->
	<header class="shop-header sticky-top">
		<div class="container">
			<div class="row align-items-center">
				<!-- LOGO -->
				<div class="col-auto">
					<a th:href="@{/shop/index}" class="shop-logo"> <img
						th:src="@{/images/logo01.png}" alt="PetLife Logo">
					</a>
				</div>
				<!-- 搜尋框 -->
				<div class="col px-lg-5">
					<form th:action="@{/shop/index}" method="get"
						class="shop-search-form">
						<div class="input-group">
							<input type="text" name="keyword"
								class="form-control search-input" placeholder="搜尋毛孩好物..."
								th:value="${keyword}">
							<button type="submit" class="btn search-submit-btn">
								<i class="fas fa-search text-muted"></i>
							</button>
						</div>
					</form>
				</div>
				<!-- 頂端右側 -->
				<div class="col-auto">
					<nav class="shop-user-nav d-flex align-items-center">
						<!-- 購物車 -->
						<a th:href="@{/api/cart/cart}"
							class="nav-icon-item position-relative d-flex flex-column align-items-center text-decoration-none">
							<i class="fas fa-shopping-cart"></i> <span
							style="font-size: 13px; color: #5a4a42;">購物車</span> <span
							id="cart-badge" th:if="${cartTotalQty > 0}"
							th:text="${cartTotalQty}"
							class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
							style="font-size: 0.7rem;"></span> <!-- 聊聊 -->
						</a> <a href="#"
							class="nav-icon-item d-flex flex-column align-items-center text-decoration-none">
							<i class="far fa-comment-dots"
							style="font-size: 1.2rem; color: #666;"></i> <span
							style="font-size: 13px; color: #5a4a42;">聊聊</span>
						</a>
						<!-- 登入判斷 -->
						<!-- 已登入 -->
						<div class="user-action-zone">
							<div th:if="${memberId != null}"
								class="d-flex align-items-center">
								<div class="user-greeting-box me-3 text-end">
									<span class="welcome-tag"> <i class="fas fa-paw"></i> <strong
										th:text="${memberName}"></strong> 你好！
									</span> <a th:href="@{/member/center}" class="member-link">會員中心</a>
								</div>
								<a th:href="@{/member/logout}"
									class="nav-icon-item d-flex flex-column align-items-center text-decoration-none text-danger">
									<i class="fas fa-sign-out-alt" style="font-size: 1.2rem;"></i>
									<span style="font-size: 13px;">登出</span>
								</a>
							</div>
							<!-- 尚未登入 -->
							<div th:unless="${memberId != null}">
								<a th:href="@{/loginChoice}"
									class="nav-icon-item d-flex flex-column align-items-center text-decoration-none">
									<i class="far fa-user-circle"
									style="font-size: 1.2rem; color: #666;"></i> <span
									style="font-size: 13px; color: #5a4a42;">登入 / 註冊</span>
								</a>
							</div>
						</div>
					</nav>
				</div>
			</div>
			<!-- 上層分類目錄 -->
			<nav class="header-nav mt-3">
				<div class="container">
					<ul class="nav-menu-list">
						<li><a th:href="@{/shop/index(all='true')}"
							class="nav-menu-link">全部商品</a></li>
						<li><a th:href="@{/shop/index(catId=1)}"
							class="nav-menu-link">🐱 貓貓專區</a></li>
						<li><a th:href="@{/shop/index(catId=2)}"
							class="nav-menu-link">🐶 狗狗專區</a></li>
						<li><a th:href="@{/beauty-booking}" class="nav-menu-link">🛁
								寵物美容</a></li>
						<li><a th:href="@{/hotel/orders/booking}" class="nav-menu-link">🏠
								寵物旅館</a></li>
						<li><a href="#" class="nav-menu-link">🔥 限時特惠</a></li>
					</ul>
				</div>
			</nav>
		</div>
	</header>

	<!-- 左方 menu 分類 -->
	<main class="shop-hero-section">
		<div class="container">
			<div class="hero-wrapper"
				th:if="${catId == null && (keyword == null || keyword == '') && hideCarousel == null}">
				<aside class="category-sidebar shadow-sm">
					<div class="sidebar-title">
						<i class="fas fa-bars me-2"></i>毛孩商品總覽
					</div>
					<nav class="sidebar-nav">
						<a th:href="@{/shop/index(all='true')}" class="category-item"><span>全部商品</span><i
							class="fas fa-chevron-right small"></i> </a> <a
							th:each="cat : ${category}"
							th:href="@{/shop/index(catId=${cat.categoryId})}"
							th:classappend="${catId == cat.categoryId} ? 'is-active'"
							class="category-item"> <span th:text="${cat.categoryName}"></span><i
							class="fas fa-chevron-right small"></i>
						</a>
					</nav>
				</aside>
				<!-- 廣告輪播 -->
				<div id="shopCarousel"
					class="carousel slide shadow-sm rounded-3 overflow-hidden"
					data-bs-ride="carousel">
					<div class="carousel-indicators">
						<button type="button" data-bs-target="#shopCarousel"
							data-bs-slide-to="0" class="active"></button>
						<button type="button" data-bs-target="#shopCarousel"
							data-bs-slide-to="1"></button>
						<button type="button" data-bs-target="#shopCarousel"
							data-bs-slide-to="2"></button>
						<button type="button" data-bs-target="#shopCarousel"
							data-bs-slide-to="3"></button>
						<button type="button" data-bs-target="#shopCarousel"
							data-bs-slide-to="4"></button>
						<button type="button" data-bs-target="#shopCarousel"
							data-bs-slide-to="5"></button>
					</div>
					<div class="carousel-inner">
						<div class="carousel-item active" data-bs-interval="2000">
							<img th:src="@{/images/ad01.jpg}" alt="廣告輪播01"
								class="d-block w-100 img-fluid"
								style="object-fit: cover; height: auto; max-height: 500px;">
						</div>
						<div class="carousel-item" data-bs-interval="2000">
							<img th:src="@{/images/ad02.jpg}" alt="廣告輪播02"
								class="d-block w-100 img-fluid"
								style="object-fit: cover; height: auto; max-height: 500px;">
						</div>
						<div class="carousel-item" data-bs-interval="2000">
							<img th:src="@{/images/ad03.jpg}" alt="廣告輪播03"
								class="d-block w-100 img-fluid"
								style="object-fit: cover; height: auto; max-height: 500px;">
						</div>
						<div class="carousel-item" data-bs-interval="2000">
							<img th:src="@{/images/ad04.jpg}" alt="廣告輪播04"
								class="d-block w-100 img-fluid"
								style="object-fit: cover; height: auto; max-height: 500px;">
						</div>
						<div class="carousel-item" data-bs-interval="2000">
							<img th:src="@{/images/ad05.jpg}" alt="廣告輪播05"
								class="d-block w-100 img-fluid"
								style="object-fit: cover; height: auto; max-height: 500px;">
						</div>
						<div class="carousel-item" data-bs-interval="2000">
							<img th:src="@{/images/ad06.jpg}" alt="廣告輪播06"
								class="d-block w-100 img-fluid"
								style="object-fit: cover; height: auto; max-height: 500px;">
						</div>
					</div>
					<button class="carousel-control-prev" type="button"
						data-bs-target="#shopCarousel" data-bs-slide="prev">
						<span class="carousel-control-prev-icon"></span>
					</button>
					<button class="carousel-control-next" type="button"
						data-bs-target="#shopCarousel" data-bs-slide="next">
						<span class="carousel-control-next-icon"></span>
					</button>
				</div>
			</div>

			<nav th:if="${catId != null || (keyword != null && keyword != '')}"
				aria-label="breadcrumb" class="py-3">
				<ol class="breadcrumb">
					<li class="breadcrumb-item"><a th:href="@{/shop/index}"
						class="text-decoration-none text-muted">商城首頁</a></li>
					<li class="breadcrumb-item active" aria-current="page"
						th:text="${searchMsg}">搜尋結果</li>
				</ol>
			</nav>
		</div>
	</main>
	<!-- 商品列表區 -->
	<section class="container product-section py-5">
		<div
			class="section-header d-flex justify-content-between align-items-center mb-4">
			<h4 class="section-title">
				<span th:if="${searchMsg != null}"> <span
					th:text="${searchMsg}"></span> <small class="text-muted"
					style="font-size: 0.9rem;"> (共 <span
						th:text="${#lists.size(products)}"></span> 件)
				</small>
				</span> <span th:if="${searchMsg == null}">精選好物</span>
			</h4>
		</div>
		<!-- 商品卡片列表 -->
		<div class="row row-cols-2 row-cols-md-4 row-cols-lg-5 g-4">
			<div class="col" th:each="p : ${products}">
				<article class="product-card shadow-sm" style="position: relative;">
					<div class="product-category-badge"
						th:text="${p.categoryName != null ? p.categoryName : '寵物好物'}"></div>

					<a th:href="@{'/product/detail?id=' + ${p.productId}}"
						class="text-decoration-none" style="color: inherit;">
						<div class="product-img-wrapper">
							<img
								th:src="${p.productImage != null ? ('/images/products/' + p.productImage) : '/images/products/default.jpg'}"
								th:alt="${p.productName}">
								
						</div>
						<div class="product-info">
							<h6 class="product-name" th:text="${p.productName}"></h6>
						</div>
					</a>
					<!-- 商品價格與加入購物車按鈕 -->
					<div class="product-info pt-0">
						<div class="product-footer">
							<span class="product-price">$ <span
								th:text="${p.productPrice}"></span></span>
							<button type="button" class="btn add-to-cart-btn"
								th:attr="data-id=${p.productId}, data-name=${p.productName}">
								<i class="fas fa-shopping-basket"></i>
							</button>
						</div>
					</div>
				</article>
			</div>
		</div>
	</section>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<script>
// 確保頁面完全載入後才執行
        $(document).ready(function () {
            console.log("JQuery 已就緒，PetLife 購物車腳本啟動！");
            
         	// 如果頁面是從瀏覽器快取（按上一頁）載入的，強制重整
            window.addEventListener('pageshow', function (event) {
                if (event.persisted) {
                    window.location.reload();
                }
            });
         	
       	  	// 使用 document 級別的事件委派，確保動態元素也能綁定事件
            $(document).off('click', '.add-to-cart-btn')
                .on('click', '.add-to-cart-btn', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                 	// 抓取按鈕上的商品資料
                    var productId = $(this).data("id");
                    var name = $(this).data("name");

                    if (!productId) return;
                    
                    // 發送 AJAX 請求到後端
                    $.ajax({
                    	url: "/api/cart/add/" + "[[${memberId}]]",
                        type: "POST",
                        contentType: "application/json; charset=utf-8",
                        data: JSON.stringify({
                            productId: productId,
                            quantity: 1
                        }),
                        success: function (response) {
                            Swal.fire({
                                icon: 'success',
                                title: '加入成功！',
                                text: '已將 [' + name + '] 放進購物車囉 🐾',
                                timer: 1500,
                                showConfirmButton: false
                            }).then(() => {
                                let badge = $("#cart-badge");
                                if (badge.length > 0) {
                                    let currentCount = parseInt(badge.text());
                                    badge.text(currentCount + 1);
                                } else {
                                    location.reload();
                                }
                            });
                        },
                        error: function (xhr, status, error) {
                            alert("連線失敗，請檢查後端 Controller 是否有啟動。");
                        }
                    });
                });
        });

     // 1. 核心加載函數 (確保寫在主頁面)
        function loadContent(title, url) {
            console.log("嘗試載入路徑:", url);
            
            // ！！！請務必確認這裏的 ID 跟你後台主框架中間那個 div 的 ID 一模一樣 ！！！
            const container = document.getElementById("contentBody"); 
            
            if (!container) {
                console.error("找不到容器！請檢查後台主頁面是否有 id='contentBody' 的標籤");
                return;
            }

            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error("讀取失敗，狀態碼: " + res.status);
                    return res.text();
                })
                .then(html => {
                    container.innerHTML = html;
                    document.title = title;
                    console.log("載入成功");
                })
                .catch(err => console.error("發生錯誤:", err));
        }

        // 2. 訂單詳情跳轉 (掛載到 window 確保子頁面點得到)
        window.loadOrderDetail = function(orderId) {
            loadContent('訂單詳情', '/api/order/detail/' + orderId);
        };
    </script>
</body>
</html>
