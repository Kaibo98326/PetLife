<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>PetLife 首頁</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" th:href="@{/css/ShopPanel.css?v=124}">
</head>

<body>
    <header class="shop-header sticky-top">
        <div class="container">
            <!-- 上層 -->
            <div class="row align-items-center flex-nowrap">
                <!-- LOGO -->
                <div class="col-auto ps-3">
                    <a th:href="@{/shop}" class="shop-logo">
                        <img th:src="@{/images/logo01.png}" alt="PetLife Logo"
                            style="height: 60px; width: auto; object-fit: contain;">
                    </a>
                </div>

                <!-- 搜尋框 -->
                <div class="col flex-grow-1">
                    <form th:action="@{/shop}" method="get" class="shop-search-form d-flex">
                        <div class="input-group">
                            <input type="text" name="keyword" class="form-control search-input" placeholder="搜尋毛孩好物..."
                                th:value="${keyword}">
                            <button type="submit" class="btn search-submit-btn">
                                <i class="fas fa-search text-muted"></i>
                            </button>
                        </div>
                    </form>
                </div>

                <!-- 購物車、聊聊、登入 -->
                <div class="col-auto ms-auto pe-3">
                    <nav class="shop-user-nav d-flex justify-content">
                        <!-- 購物車 -->
                        <a th:href="@{/cart}" class="nav-icon-item position-relative">
                            <i class="fas fa-shopping-cart"></i>
                            <span>購物車</span>
                            <span id="cart-badge" th:if="${cartTotalQty > 0}" th:text="${cartTotalQty}"
                                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                                style="font-size: 0.7rem;"></span>
                        </a>

                        <!-- 聊聊 -->
                        <a href="#" class="nav-icon-item">
                            <i class="far fa-comment-dots"></i><span>聊聊</span>
                        </a>

                        <!-- 登入判斷 -->
                        <!-- 已登入 -->
                        <div th:if="${memberId != null}">
                            <span class="user-greeting me-3 text-muted" style="font-size: 0.9rem;">
                                <i class="fas fa-paw text-warning"></i>
                                <strong th:text="${memberName}"></strong> 你好！
                            </span>
                            <a th:href="@{/member/center}" class="nav-icon-item">
                                <i class="fas fa-user-check"></i><span>會員中心</span>
                            </a>
                            <a th:href="@{/member/logout}" class="nav-icon-item ms-2 text-danger">
                                <i class="fas fa-sign-out-alt"></i><span>登出</span>
                            </a>
                        </div>

                        <!-- 未登入 -->
                        <div th:unless="${memberId != null}">
                            <a th:href="@{/loginChoice}" class="nav-icon-item">
                                <i class="far fa-user-circle"></i><span>登入 / 註冊</span>
                            </a>
                        </div>


                    </nav>
                </div>
            </div>
            <!-- 下層導覽 -->
            <nav class="header-nav">
                <div class="container">
                    <ul class="nav-menu-list">
                        <li><a th:href="@{/shop}" class="nav-menu-link">全部商品</a></li>
                        <li><a th:href="@{/shop?catId=1}" class="nav-menu-link">🐱 貓貓專區</a></li>
                        <li><a th:href="@{/shop?catId=2}" class="nav-menu-link">🐶 狗狗專區</a></li>
                        <li><a th:href="@{/beauty-booking}" class="nav-menu-link">🛁 寵物美容</a></li>
                        <li><a th:href="@{/stay/selectPet}" class="nav-menu-link">🏠 寵物旅館</a></li>
                        <li><a href="#" class="nav-menu-link">🔥 限時特惠</a></li>
                    </ul>
                </div>
            </nav>
        </div>
    </header>
    <main class="shop-hero-section">
        <div class="container">
            <div class="hero-wrapper">
                <!-- 左方分類 -->
                <aside class="category-sidebar shadow-sm">
                    <div class="sidebar-title">
                        <i class="fas fa-bars me-2"></i>毛孩商品總覽
                    </div>
                    <nav class="sidebar-nav">
                        <a th:href="@{/shop}" th:classappend="${catId == null} ? 'is-active'" class="category-item">
                            <span>全部商品</span><i class="fas fa-chevron-right small"></i>
                        </a>
                        <a th:each="cat : ${category}" th:href="@{'/shop?catId=' + ${cat.categoryId}}"
                            th:classappend="${catId == cat.categoryId} ? 'is-active'" class="category-item">
                            <span th:text="${cat.categoryName}"></span><i class="fas fa-chevron-right small"></i>
                        </a>
                    </nav>
                </aside>

                <!-- 廣告輪播 -->
                <div id="shopCarousel" class="carousel slide shadow-sm rounded-3 overflow-hidden"
                    data-bs-ride="carousel">
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#shopCarousel" data-bs-slide-to="0"
                            class="active"></button>
                        <button type="button" data-bs-target="#shopCarousel" data-bs-slide-to="1"></button>
                        <button type="button" data-bs-target="#shopCarousel" data-bs-slide-to="2"></button>
                        <button type="button" data-bs-target="#shopCarousel" data-bs-slide-to="3"></button>
                        <button type="button" data-bs-target="#shopCarousel" data-bs-slide-to="4"></button>
                        <button type="button" data-bs-target="#shopCarousel" data-bs-slide-to="5"></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active" data-bs-interval="2000">
                            <img th:src="@{/images/ad01.jpg}" alt="廣告輪播01" class="d-block w-100 img-fluid"
                                style="object-fit: cover; height: auto; max-height: 500px;">
                        </div>
                        <div class="carousel-item" data-bs-interval="2000">
                            <img th:src="@{/images/ad02.jpg}" alt="廣告輪播02" class="d-block w-100 img-fluid" 
                                style="object-fit: cover; height: auto; max-height: 500px;">
                        </div>
                        <div class="carousel-item" data-bs-interval="2000">
                            <img th:src="@{/images/ad03.jpg}" alt="廣告輪播03" class="d-block w-100 img-fluid"
                                style="object-fit: cover;height: auto; max-height: 500px;">
                        </div>
                        <div class="carousel-item" data-bs-interval="2000">
                            <img th:src="@{/images/ad04.jpg}" alt="廣告輪播04" class="d-block w-100 img-fluid"
                                style="object-fit: cover;height: auto; max-height: 500px;">
                        </div>
                        <div class="carousel-item" data-bs-interval="2000">
                            <img th:src="@{/images/ad05.jpg}" alt="廣告輪播05" class="d-block w-100 img-fluid"
                                style="object-fit: cover;height: auto; max-height: 500px;">
                        </div>
                        <div class="carousel-item" data-bs-interval="2000">
                            <img th:src="@{/images/ad06.jpg}" alt="廣告輪播06" class="d-block w-100 img-fluid"
                                style="object-fit: cover;height: auto; max-height: 500px;">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#shopCarousel"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#shopCarousel"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon"></span>
                    </button>
                </div>
            </div>
        </div>
    </main>
    <!-- 商品列表區 -->
    <section class="container product-section py-5">
        <div class="section-header d-flex justify-content-between align-items-center mb-4">
            <h4 class="section-title">
                <!-- 判斷是否有搜尋訊息 -->
                <span th:if="${searchMsg != null}">
                    <!-- 顯示搜尋訊息 -->
                    <span th:text="${searchMsg}"></span>
                    <!-- 顯示商品總數 -->
                    <small class="text-muted" style="font-size: 0.9rem;">
                        (共 <span th:text="${#lists.size(products)}"></span> 件)
                    </small>
                </span>
                <!-- 如果沒有搜尋訊息，顯示預設文字 -->
                <span th:if="${searchMsg == null}">精選好物</span>
            </h4>
        </div>

        <!-- 商品卡片列表 -->
        <div class="row row-cols-2 row-cols-md-4 row-cols-lg-5 g-4">
            <!-- 迴圈顯示每一個商品 -->
            <div class="col" th:each="p : ${products}">
                <article class="product-card shadow-sm" style="position: relative;">
                    <!-- 商品分類標籤 -->
                    <div class="product-category-badge" th:text="${p.categoryName}"></div>

                    <!-- 商品連結：點擊進入商品詳細頁 -->
                    <a th:href="@{'/product/detail?id=' + ${p.productId}}" class="text-decoration-none"
                        style="color: inherit;">
                        <div class="product-img-wrapper">
                            <!-- 商品圖片 -->
                            <img th:src="@{'/images/' + ${p.productImage}}" th:alt="${p.productName}">
                        </div>
                        <div class="product-info">
                            <!-- 商品名稱 -->
                            <h6 class="product-name" th:text="${p.productName}"></h6>
                        </div>
                    </a>

                    <!-- 商品價格與加入購物車按鈕 -->
                    <div class="product-info pt-0">
                        <div class="product-footer">
                            <!-- 商品價格 -->
                            <span class="product-price">$ <span th:text="${p.productPrice}"></span></span>
                            <!-- 加入購物車按鈕，帶商品ID與名稱 -->
                            <button type="button" class="btn add-to-cart-btn"
                                th:attr="data-id=${p.productId}, data-name=${p.productName}">
                                <i class="fas fa-shopping-basket"></i>
                            </button>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </section>
    <!-- 外部 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // 確保頁面完全載入後才執行
        $(document).ready(function () {
            console.log("JQuery 已就緒，PetLife 購物車腳本啟動！");

            // 如果頁面是從瀏覽器快取（按上一頁）載入的，強制重整
            window.addEventListener('pageshow', function (event) {
                if (event.persisted) {
                    window.location.reload();
                }
            });

            // 使用 document 級別的事件委派，確保動態元素也能綁定事件
            $(document).off('click', '.add-to-cart-btn')
                .on('click', '.add-to-cart-btn', function (e) {
                    e.preventDefault();
                    e.stopPropagation();

                    // 抓取按鈕上的商品資料
                    var productId = $(this).data("id");
                    var name = $(this).data("name");

                    console.log("點擊觸發！商品ID:", productId, "商品名稱:", name);

                    if (!productId) {
                        console.error("錯誤：找不到 data-id 屬性！請檢查 HTML 按鈕標籤。");
                        return;
                    }

                    // 發送 AJAX 請求到後端
                    $.ajax({
                        url: "/cart/add",   // 這裡改成 Spring Boot Controller 的路徑
                        type: "POST",
                        data: {
                            productId: productId,
                            quantity: 1
                        },
                        success: function (response) {
                            console.log("後端回傳成功");

                            // 使用 SweetAlert 顯示提示訊息
                            Swal.fire({
                                icon: 'success',
                                title: '加入成功！',
                                text: '已將 [' + name + '] 放進購物車囉 🐾',
                                timer: 1500,
                                showConfirmButton: false
                            }).then(() => {
                                let badge = $("#cart-badge");
                                if (badge.length > 0) {
                                    let currentCount = parseInt(badge.text());
                                    badge.text(currentCount + 1); // 每次加 1 件
                                } else {
                                    // 如果原本沒有 badge，重整頁面讓標籤生出來
                                    location.reload();
                                }
                            });
                        },
                        error: function (xhr, status, error) {
                            console.error("AJAX 發送失敗！狀態碼:", xhr.status, "錯誤訊息:", error);
                            alert("連線失敗，請檢查後端 Controller 是否有啟動。");
                        }
                    });
                });
        });
    </script>
</body>

</html>
