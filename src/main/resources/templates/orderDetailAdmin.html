<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>訂單詳細資訊 - PetLife 後台</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
:root {
	--orange-dark: #E65100;
	--orange-main: #FF9800;
	--orange-light: #FFF3E0;
}

body {
	background-color: #f8f9fa;
	font-family: "Microsoft JhengHei", sans-serif;
}

.detail-wrapper {
	max-width: 1000px;
	margin: 30px auto;
}

/* 標題裝飾 */
.page-header {
	background: linear-gradient(to right, var(--orange-dark),
		var(--orange-main));
	color: white;
	padding: 20px 30px;
	border-radius: 12px;
	margin-bottom: 25px;
}

/* 卡片設計 */
.info-card {
	background: white;
	border: 1px solid #FFE0B2;
	border-radius: 12px;
	padding: 20px;
	margin-bottom: 20px;
	box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
}

.section-title {
	color: var(--orange-dark);
	border-left: 5px solid var(--orange-main);
	padding-left: 15px;
	margin-bottom: 20px;
	font-weight: bold;
}

/* 表格美化 */
.detail-table thead {
	background-color: var(--orange-light);
	color: var(--orange-dark);
}

.text-orange-deep {
	color: #D84315;
	font-weight: bold;
}

.btn-back {
	background-color: white;
	color: var(--orange-dark);
	border: 2px solid var(--orange-dark);
	font-weight: bold;
	transition: all 0.3s;
}

.btn-back:hover {
	background-color: var(--orange-dark);
	color: white;
}
</style>
</head>
<body>

	<div class="detail-wrapper p-3">
		<div class="d-flex justify-content-between align-items-center mb-3">
			
			<span class="text-muted">訂單編號：<strong
				th:text="${order.orderId}"></strong></span>
		</div>

		<div class="page-header shadow-sm">
			<h4 class="m-0">
				<i class="bi bi-info-circle me-2"></i> 訂單詳細資訊
			</h4>
		</div>

		<div class="row">
			<div class="col-md-5">
				<div class="info-card">
					<h5 class="section-title">收件資訊</h5>
					<table class="table table-sm table-borderless">
						<tr>
							<th width="40%">收件人姓名</th>
							<td th:text="${order.orderName}"></td>
						</tr>
						<tr>
							<th>聯絡電話</th>
							<td th:text="${order.orderPhone}"></td>
						</tr>
						<tr>
							<th>收件地址</th>
							<td th:text="${order.orderAddress}"></td>
						</tr>
						<tr>
							<th>會員編號</th>
							<td th:text="${order.memberId}"></td>
						</tr>
					</table>
				</div>

				<div class="info-card">
					<h5 class="section-title">付款與狀態</h5>
					<table class="table table-sm table-borderless">
						<tr>
							<th width="40%">下單日期</th>
							<td
								th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm:ss')}"></td>
						</tr>
						<tr>
							<th>付款方式</th>
							<td><span class="badge bg-warning text-dark"
								th:text="${order.orderPayment}"></span></td>
						</tr>
						<tr>
							<th>訂單狀態</th>
							<td><span class="badge bg-primary"
								th:text="${order.orderStatus}"></span></td>
						</tr>
						<tr>
							<th>備註</th>
							<td th:text="${order.orderNote ?: '無'}"></td>
						</tr>
					</table>
				</div>
			</div>

			<div class="col-md-7">
				<div class="info-card">
					<h5 class="section-title">商品明細</h5>
					<div class="table-responsive">
						<table class="table align-middle detail-table">
							<thead>
								<tr>
									<th>商品名稱</th>
									<th class="text-center">單價</th>
									<th class="text-center">數量</th>
									<th class="text-end">小計</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="item : ${details}">
									<td th:text="${item.productName}">商品名稱</td>
									<td class="text-center" th:text="'$' + ${item.productPrice}"></td>
									<td class="text-center" th:text="${item.quantity}"></td>
									<td class="text-end fw-bold" th:text="'$' + ${item.subtotal}"></td>
								</tr>
							</tbody>
							<tfoot>
								<tr>
									<td colspan="3" class="text-end fw-bold">總計金額：</td>
									<td class="text-end text-orange-deep fs-5"
										th:text="'$' + ${order.orderTotal}"></td>
								</tr>
							</tfoot>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
