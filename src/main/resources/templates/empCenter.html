<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>petDB 後臺管理系統</title>
    <script th:src="@{/js/pet.js}" defer></script>
    <link rel="stylesheet" th:href="@{/css/AdminPanel.css}">
    <link rel="stylesheet" th:href="@{/css/emplist.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/beauty-embed.css}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
     <style>
        /* 橘色表格樣式 */
        .table-orange thead {
            background-color: #ff9800;
            color: #fff;
        }
        .table-orange tbody tr:nth-child(even) {
            background-color: #fff3e0;
        }
        .table-orange tbody tr:hover {
            background-color: #ffe0b2;
        }
    </style>
</head>

<body>
	<!-- 頂部欄 -->
	<div class="header">
		<div class="header-left">
			<div class="header-logo">🐾 PetLife 後臺管理系統</div>
		</div>
		<div class="header-right">
			<div class="user-info">
				<div class="user-avatar">👤</div>
				<div class="user-details">
					<div class="user-name" id="userName" th:text="${empName}">員工姓名</div>
					<div class="user-role">系統管理員</div>
				</div>
			</div>
			<button class="logout-btn"
				th:onclick="'window.location.href=\'' + @{/employee/logout} + '\''">登出</button>
		</div>
	</div>

	<!-- 主容器 -->
	<div class="main-container">
		<!-- 側邊欄 -->
		<aside class="sidebar">
			<div class="sidebar-header">📋 功能菜單</div>
			<ul class="menu-list">
				<li class="menu-item"><a class="menu-link active" href="#"
					onclick="loadContent('會員管理', 'member')">👥 會員管理</a></li>
				<li class="menu-item"><a class="menu-link" href="#"
					onclick="loadContent('員工管理', 'permission')">🔐 員工管理</a></li>
				<li class="menu-item"><a class="menu-link" href="#"
					onclick="loadContent('寵物管理', 'pet')">🐕 寵物管理</a></li>
				<li class="menu-item has-submenu"><a href="javascript:void(0);"
					class="menu-link" onclick="toggleSubmenu(this)"> <span
						class="menu-icon">📦</span> <span>商品管理</span> <span
						id="sidebarLowStockBadge" class="sidebar-badge-num"
						th:if="${lowStockCount > 0}" th:text="${lowStockCount}">3</span></a>
					<ul class="submenu">
						<li><a class="menu-link"
							onclick="loadContent('商品類別管理', 'category&_t=' + new Date().getTime());">
								📂 商品類別管理 </a></li>
						<li><a class="menu-link"
							onclick="loadContent('商品管理','product')"> 🛒 商品管理 <span
								id="sidebarLowStockWarn" class="sidebar-badge-warn"
								th:if="${lowStockCount > 0}">!</span>
						</a></li>
					</ul></li>
				<li class="menu-item"><a class="menu-link"
					onclick="loadContent('訂單管理', 'order')"> <span class="menu-icon">📋</span>
						<span>訂單管理</span>
				</a></li>
				<li class="menu-item has-submenu"><a href="javascript:void(0);"
					class="menu-link" onclick="toggleSubmenu(this)"> <span
						class="menu-icon">💅</span> <span>美容管理</span></a>
					<ul class="submenu">
						<li><a class="menu-link"
							onclick="loadContent('美容項目管理','groomingItem')">美容項目管理</a></li>
						<li><a class="menu-link"
							onclick="loadContent('美容預約管理','groomingRecord')">美容預約管理</a></li>
					</ul></li>
				<li class="menu-item has-submenu"><a href="javascript:void(0);"
					class="menu-link" onclick="toggleSubmenu(this)"> <span
						class="menu-icon">🏨</span> <span>寵物旅館管理</span></a>
					<ul class="submenu">
						<li><a class="menu-link"
							onclick="loadContent('旅館訂單管理','hotel_orders')">📋 旅館訂單管理</a></li>
						<li><a class="menu-link"
							onclick="loadContent('旅館房型管理','hotel_rooms')">🛏️ 旅館房型管理</a></li>
					</ul></li>
				<li class="menu-item"><a class="menu-link" href="#"
					onclick="loadContent('優惠活動管理','promotion')"> <span
						class="menu-icon">🎉</span> <span>優惠活動管理</span>
				</a></li>
			</ul>
		</aside>

		<!-- 內容區域 -->
		<div class="content-area">
			<div class="content-header">
				<div>
					<div class="content-title" id="contentTitle">會員管理</div>
					<div class="content-breadcrumb">
						首頁 > <span id="breadcrumb">會員管理</span>
					</div>
				</div>
			</div>
			<div class="content-body" id="contentBody">
				<div class="content-placeholder">
					<div>
						<div style="font-size: 2rem; margin-bottom: 1rem;">👋</div>
						<p>歡迎使用 petDB 後臺管理系統</p>
						<p style="font-size: 0.9rem; margin-top: 0.5rem;">請從左側菜單選擇要管理的功能</p>
					</div>
				</div>
			</div>
			<iframe id="mainFrame" name="mainFrame"
				style="width: 100%; height: 100%; border: none; display: none;"></iframe>
		</div>
	</div>
	<!-- menuMap -->
	<script th:inline="javascript">
        window.menuMap = window.menuMap ||{
            'member': { title: '會員管理', url: /*[[@{/members/list}]]*/'', type: 'ajax' },
            'memberSearch': { title: '會員管理', url: /*[[@{/members/search}]]*/'', type: 'ajax' },
            'permission': { title: '員工管理', url: /*[[@{/employee/EMO}]]*/ '', type: 'ajax' },
            'pet': { title: '寵物管理', url: /*[[@{/pets/admin/list}]]*/ '/pets/admin/list', type: 'ajax' },
            'order': { title: '訂單管理', url: /*[[@{/api/order/all}]]*/'/api/order/all', type: 'ajax' },
            'category': { title: '商品類別管理', url: /*[[@{/innerCategory/list}]]*/'', type: 'ajax' },
            'product': { title: '商品管理', url: /*[[@{/innerProduct/list}]]*/ '', type: 'ajax' },
            'groomingItem': { title: '美容項目管理', url: /*[[@{/admin/beauty/item/list}]]*/ '', type: 'ajax' },
            'groomingItemAdd': { title: '新增美容項目', url: /*[[@{/admin/beauty/item/add}]]*/ '', type: 'ajax' },
            'groomingItemEdit': { title: '修改美容項目', url: /*[[@{/admin/beauty/item/edit}]]*/ '', type: 'ajax' },
            'groomingItemDelete': { title: '美容項目管理', url: /*[[@{/admin/beauty/item/delete}]]*/ '', type: 'ajax' },
            'groomingRecord': { title: '美容預約管理', url: /*[[@{/admin/beauty/record/list}]]*/ '', type: 'ajax' },
            'groomingRecordAdd': { title: '新增美容預約', url: /*[[@{/admin/beauty/record/add}]]*/ '', type: 'ajax' },
            'groomingRecordEdit': { title: '修改美容預約', url: /*[[@{/admin/beauty/record/edit}]]*/ '', type: 'ajax' },
            'groomingRecordDelete': { title: '美容預約管理', url: /*[[@{/admin/beauty/record/delete}]]*/ '', type: 'ajax' },
            'hotel_orders': { title: '旅館訂單管理', url: '#', type: 'ajax' },
            'hotel_rooms': { title: '旅館房型管理', url: '#', type: 'ajax' },
            'promotion': { title: '優惠活動管理', url:/*[[@{/discount/index}]]*/'' , type: 'ajax' }, 
            'empList': { title: '員工列表', url: /*[[@{/employee/list}]]*/'', type: 'ajax' },
            'empAdd': { title: '新增員工', url: /*[[@{/employee/add}]]*/'', type: 'ajax' },
            'empEdit': { title: '編輯員工', url: /*[[@{/employee/edit}]]*/'', type: 'ajax' },
            'empSearch': { title: '員工列表', url: /*[[@{/employee/search}]]*/'', type: 'ajax' },
            'roleList': { title: '角色管理', url: /*[[@{/role/list}]]*/'', type: 'ajax' },
            'empRoleList': { title: '員工角色管理', url: /*[[@{/role/empRoleList}]]*/'', type: 'ajax' }

        };

        function loadContent(title, module) {
            updateActiveMenu(module);
            document.getElementById('contentTitle').textContent = title;
            document.getElementById('breadcrumb').textContent = title;

            let [mod, ...params] = module.split('&');
            const menuItem = menuMap[mod];
            if (!menuItem) return;

            let url = menuItem.url;
            const type = menuItem.type || 'ajax';

            if (params.length > 0) {
                const queryString = params.join('&');
                url += (url.includes('?') ? '&' : '?') + queryString;
            }

            if (url === '#') {
                showPlaceholder(title, module);
            } else if (type === 'iframe') {
                document.getElementById('contentBody').style.display = 'none';
                const frame = document.getElementById('mainFrame');
                frame.style.display = 'block';
                frame.src = url;
            } else {
                document.getElementById('mainFrame').style.display = 'none';
                document.getElementById('contentBody').style.display = 'block';
                loadContentViaAjax(url, title, module);
            }
        }

        function toggleSubmenu(el) {
            const parent = el.parentElement;
            parent.classList.toggle('open');
        }

        function loadContentViaAjax(url, title, module) {
            const contentBody = document.getElementById('contentBody');
            contentBody.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在加載 ${title}...</p>
                </div>
            `;

            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return response.text();
                })
                .then(html => {
                    const cleanHtml = extractBodyContent(html);
                    contentBody.innerHTML = cleanHtml;
                    executeScripts(contentBody);

                    if (module === "pet") {
                        initPetTableEvents();
                        
                    }
                })
                .catch(error => {
                    contentBody.innerHTML = `
                        <div class="error-message">
                            <strong>加載失敗</strong><br>
                            無法加載 ${title}，請稍後重試。<br>
                            <small>錯誤信息: ${error.message}</small>
                        </div>
                    `;
                });
        }

        function extractBodyContent(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const body = doc.body;
            return (body && body.innerHTML.trim()) ? body.innerHTML : html;
        }

        function executeScripts(container) {
            const scripts = container.querySelectorAll('script');
            scripts.forEach(script => {
                // 避免重複宣告 menuMap 或其他全域變數
                if (script.textContent.includes('menuMap')) return;

                const newScript = document.createElement('script');
                newScript.textContent = script.textContent;
                container.appendChild(newScript);
            });
        }

        function showPlaceholder(title, module) {
            document.getElementById('contentBody').innerHTML = `
                <div class="content-placeholder">
                    <div>
                        <div style="font-size: 3rem; margin-bottom: 1rem;">🚧</div>
                        <h2>${title}</h2>
                        <p style="margin-top: 1rem; color: #999;">此功能尚未實現</p>
                        <p style="font-size: 0.9rem; color: #ccc; margin-top: 0.5rem;">
                            模塊: <code>${module}</code>
                        </p>
                    </div>
                </div>
            `;
        }

        function updateActiveMenu(module) {
            document.querySelectorAll('.menu-link').forEach(link => link.classList.remove('active'));
            document.querySelectorAll('.menu-link').forEach(item => {
                if (item.onclick && item.onclick.toString().includes(`'${module}'`)) {
                    item.classList.add('active');
                }
            });
        }

        function logout() {
            if (confirm('確定要登出嗎？')) {
                window.location.href = /*[[@{/employee/logout}]]*/'';
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            const module = params.get('module');
            if (module && menuMap[module]) {
                loadContent(menuMap[module].title, module);
            } else {
                loadContent('會員管理', 'member');
            }
        });

        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            const module = params.get('module');
            if (module && menuMap[module]) {
                loadContent(menuMap[module].title, module);
            } else {
                loadContent('會員管理', 'member');
            }
        });
        $(document).on('submit', '#empAddForm', function(e){
            e.preventDefault();
            $.post('/employee/add', $(this).serialize(), function(res){
                $('#contentBody').html(res); // 塞回主框架的 contentBody
                // 可選：更新 breadcrumb/title
                document.getElementById('contentTitle').textContent = '員工列表';
                document.getElementById('breadcrumb').textContent = '員工列表';
            });
        });

    </script>

	<!-- 外部 JS 引入 -->
	<script th:src="@{../js/emp.js}"></script>
	<script th:src="@{../js/discount.js}"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>


</body>

</html>
