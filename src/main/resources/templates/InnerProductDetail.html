<div class="category-wrapper">
    <div class="card-panel" id="innerProductDetailArea">
        <link rel="stylesheet" th:href="@{/css/InnerProduct.css}">
        
        <div class="page-title-area">
            <div class="page-header-text">商品完整規格檢視</div>
        </div>

        <fieldset class="detail-fieldset">
            <legend> 商品基本資料 </legend>
            <table class="view-table">
                <thead>
                    <tr>
                        <th width="20%"></th>
                        <th width="30%"></th>
                        <th width="20%"></th>
                        <th width="30%"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="label-cell">商品編號</td>
                        <td th:text="${'#' + product.productId}">ID</td>
                        <td class="label-cell">商品狀態</td>
                        <td>
                            <span th:class="${product.productStatus == 1} ? 'status-badge status-on' : 'status-badge status-off'"
                                  th:text="${product.productStatus == 1} ? '✅ 上架中' : '❌ 已下架'">
                            </span>
                        </td>
                    </tr>
                    <tr>
                        <td class="label-cell">分類編號</td>
                        <td th:text="${product.categoryId}">0</td>
                        <td class="label-cell">分類名稱</td>
                        <td>
                            <span class="cat-badge" th:text="${product.categoryName}">分類名稱</span>
                        </td>
                    </tr>
                    <tr>
                        <td class="label-cell">商品名稱</td>
                        <td colspan="3" class="product-name-td" 
                            style="font-size: 1.2rem; font-weight: bold; color: var(--text-dark);"
                            th:text="${product.productName}">商品名稱</td>
                    </tr>
                    <tr>
                        <td class="label-cell">商品價格</td>
                        <td style="color: var(--primary-orange); font-weight: bold; font-size: 1.15rem;"
                            th:text="'NT$ ' + ${product.productPrice}">NT$ 0</td>
                        <td class="label-cell">庫存位置</td>
                        <td th:text="${#strings.isEmpty(product.storagePosition) ? '未註記' : product.storagePosition}">未註記</td>
                    </tr>
                    <tr>
                        <td class="label-cell">目前庫存</td>
                        <td>
                            <div th:if="${product.productStock <= product.lowStock}">
                                <strong class="del-btn" style="font-size: 1.1rem;"
                                        th:text="${product.productStock} + ' 件 (低於門檻!)'">0 件</strong>
                            </div>
                            <div th:unless="${product.productStock <= product.lowStock}">
                                <span th:text="${product.productStock} + ' 件'">0 件</span>
                            </div>
                        </td>
                        <td class="label-cell">庫存預警值</td>
                        <td th:text="${product.lowStock} + ' 件'">0 件</td>
                    </tr>
                </tbody>
            </table>
        </fieldset>

        <div class="detail-flex-layout" style="display: flex; gap: 20px; align-items: flex-start;">
            <fieldset class="detail-fieldset" style="flex: 1; min-width: 300px;">
                <legend> 商品圖片 </legend>
                <div class="detail-img-box">
                    <div th:if="${not #strings.isEmpty(product.productImage)}">
                        <img th:src="@{'/' + ${p.productImage}}" 
                             alt="商品圖片">
                    </div>
                    <div th:unless="${not #strings.isEmpty(product.productImage)}" 
                         style="height: 250px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; color: #ccc; border-radius: 8px;">
                        暫無圖片
                    </div>
                </div>
            </fieldset>

            <fieldset class="detail-fieldset" style="flex: 1.5;">
                <legend> 商品詳細描述 </legend>
                <div class="detail-desc-box"
                     th:text="${not #strings.isEmpty(product.productDescription) ? product.productDescription : '此商品目前暫無詳細說明資訊。'}">
                </div>
            </fieldset>
        </div>

        <div class="action-footer">
            <button type="button" class="btn-main" th:onclick="editProduct([[${product.productId}]])">
                編輯資訊
            </button>
            <button type="button" class="btn-secondary" onclick="refreshProductList()">
                返回清單
            </button>
        </div>
    </div>
</div>
