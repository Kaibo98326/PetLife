<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>訂單紀錄 - PetLife</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<link rel="stylesheet" th:href="@{/css/MemberCenter.css}">

<link rel="stylesheet" th:href="@{/css/orderHistory.css}">
</head>
<body>
	<header>
		<div class="logo">PetLife 訂單管理</div>
		<nav>
			<a th:href="@{/member/center}">返回會員中心</a>
		</nav>
	</header>

	<section class="container-fluid px-5 mt-4">
		<h2 class="mb-4">我的訂單紀錄</h2>
		<hr>

		<div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
			<p>目前還沒有任何訂單紀錄喔！</p>
			<a th:href="@{/shop/index}" class="btn btn-warning">前往購物</a>
		</div>

		<div class="table-responsive" th:unless="${#lists.isEmpty(orders)}">
			<table class="table table-hover align-middle custom-table">
				<thead class="table-light">
					<tr>
						<th style="width: 8%">單號</th>
						<th style="width: 20%">下單時間</th>
						<th style="width: 15%">訂單金額</th>
						<th style="width: 15%">交易狀態</th>
						<th style="width: 15%">付款方式</th>
						<th style="width: 12%" class="text-end">訂單明細</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="order : ${orders}">
						<td><strong th:text="${order.orderId}"></strong></td>
						<td
							th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm:ss')}"></td>
						<td><span class="price-text"
							th:text="'$' + ${#numbers.formatDecimal(order.orderTotal, 1, 'COMMA', 0, 'POINT')}"></span>
						</td>
						<td><span
							th:classappend="${order.orderStatus == '已完成'} ? 'badge bg-success' : 'badge bg-warning text-dark'"
							th:text="${order.orderStatus}"></span></td>
						<td th:text="${order.orderPayment}"></td>
						<td class="text-end">
							<button class="btn btn-warning btn-sm px-4 fw-bold shadow-sm"
								th:onclick="|location.href='@{/api/order/orderDetail/{id}(id=${order.orderId})}'|">
								查看訂單內容</button>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</section>

	<footer>
		<p>© 2026 寵物百貨 - 訂單查詢系統</p>
	</footer>
</body>
</html>
