<!-- empAdd.html -->
<div th:fragment="addFragment">
    <div class="card">
        <div class="card-header">
            <span class="card-icon">➕</span>
            <h2>新增員工</h2>
        </div>

        <form th:action="@{/employee/add}" method="post"
              onsubmit="return empPostFormThenShow(this, '員工列表', 'empList');"
              class="styled-form">

            <label>姓名：</label>
            <input type="text" name="empName" required>

            <label>帳號：</label>
            <input type="text" name="username" required>

            <label>密碼：</label>
            <input type="password" name="passwordHash" required>

            <label>電話：</label>
            <input type="text" name="empPhone">

            <label>地址：</label>
            <input type="text" name="empAddress">

            <label>緊急聯絡人：</label>
            <input type="text" name="emergencyContact">

            <label>緊急聯絡人電話：</label>
            <input type="text" name="emergencyphone">

            <button type="submit" class="btn btn-add">送出</button>
            <button type="button"
                    onclick="loadContent('員工列表', 'empList')">
                回列表
            </button>
        </form>
    </div>
</div>
