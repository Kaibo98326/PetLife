<div id="listFragment" th:fragment="listFragment" class="container mt-4">

    <!-- 搜尋框 -->
    <form id="searchForm" class="d-flex mb-3" onsubmit="event.preventDefault(); searchEmpByName();">
        <input type="text" id="searchEmpName" name="empName"
               th:value="${searchKeyword}" placeholder="輸入姓名查詢"
               class="form-control me-2">
        <button type="submit" class="btn btn-primary">搜尋</button>
        <button type="button" class="btn btn-success" onclick="addEmployee()">新增員工</button>
    </form>

    <!-- 員工清單 -->
    <table class="table table-striped table-hover table-bordered shadow-sm table-orange">
        <thead class="table-dark">
            <tr>
                <th>員工編號</th>
                <th>姓名</th>
                <th>帳號</th>
                <th>狀態</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="emp : ${empList}">
                <td th:text="${emp.empId}"></td>
                <td th:text="${emp.empName}"></td>
                <td th:text="${emp.username}"></td>
                <td>
                    <span th:text="${emp.status}"
                          th:classappend="${emp.status == 'active'} ? 'badge bg-success' : 
                                          (${emp.status == 'disable'} ? 'badge bg-warning' : 'badge bg-danger')">
                    </span>
                </td>
                <td>
                    <!-- 編輯按鈕 -->
                    <button class="btn btn-sm btn-warning"
                            th:onclick="|loadContent('編輯員工', 'empEdit&empId=' + ${emp.empId})|">
                        編輯</button>
                    <!-- 刪除按鈕 -->
                    <button class="btn btn-sm btn-danger ms-1"
                            th:onclick="|deleteEmployee(${emp.empId})|">
                        刪除</button>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- 分頁控制 (一般清單) -->
    <nav th:if="${searchKeyword == null}" class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:onclick="|loadContent('員工列表', 'empList&page=' + (${currentPage} - 1))|">上一頁</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link">第 <span th:text="${currentPage + 1}"></span> / <span th:text="${totalPages}"></span> 頁</span>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link"
                   th:onclick="|loadContent('員工列表', 'empList&page=' + (${currentPage} + 1))|">下一頁</a>
            </li>
        </ul>
    </nav>

    <!-- 分頁控制 (搜尋結果) -->
<nav th:if="${searchKeyword != null}" class="mt-3">
    <ul class="pagination justify-content-center">
        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
            <a class="page-link"
               th:attr="data-keyword=${searchKeyword},data-page=${currentPage - 1}"
               onclick="loadSearchPage(this)">
               上一頁
            </a>
        </li>
        <li class="page-item disabled">
            <span class="page-link">第 <span th:text="${currentPage + 1}"></span> / <span th:text="${totalPages}"></span> 頁</span>
        </li>
        <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
            <a class="page-link"
               th:attr="data-keyword=${searchKeyword},data-page=${currentPage + 1}"
               onclick="loadSearchPage(this)">
               下一頁
            </a>
        </li>
    </ul>
</nav>



    <script>
    function loadSearchPage(element) {
        const keyword = element.getAttribute("data-keyword");
        const page = element.getAttribute("data-page");
        loadContent('員工列表', 'empSearch&empName=' + encodeURIComponent(keyword) + '&page=' + page);
    }
	
    function deleteEmployee(empId) {
        if (confirm("確定要刪除員工 #" + empId + " 嗎？")) {
            fetch('/employee/delete/' + empId, {
                method: 'POST'
            }).then(response => {
                if (response.ok) {
                    alert("員工已標記為刪除");
                    loadContent('員工列表', 'empList'); // 重新載入列表
                } else {
                    alert("操作失敗");
                }
            });
        }
    }
    function addEmployee() {
        fetch('/employee/add')
            .then(response => response.text())
            .then(html => {
                document.querySelector("#listFragment").outerHTML = html;
            })
            .catch(error => {
                console.error("載入新增員工表單失敗:", error);
                alert("無法載入新增員工表單，請稍後再試");
            });
    }
    </script>
</div>
