<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>新增寵物 - PetLife</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/petlist.css}">
</head>

<body>
    <header class="py-3 mb-4 border-bottom">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="logo fw-bold fs-4">新增寵物</div>
            <nav>
                <a th:href="@{/member/center}" class="btn btn-outline-primary">返回會員中心</a>
            </nav>
        </div>
    </header>

    <section class="container">
        <form th:action="@{/pets/add}" method="post" enctype="multipart/form-data" class="card p-4 shadow-sm">
            <input type="hidden" name="memberId" th:value="${memberId}">

            <div class="mb-3">
                <label class="form-label">寵物名稱</label>
                <input type="text" name="petName" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">品種</label>
                <input type="text" name="breed" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">種類</label>
                <select name="species" class="form-select" required>
                    <option value="">請選擇</option>
                    <option value="貓">貓</option>
                    <option value="狗">狗</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">年齡(歲)</label>
                <input type="number" name="age" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">體重(公斤)</label>
                <input type="number" step="0.1" name="weight" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">備註</label>
                <textarea name="medicalHistory" class="form-control"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">寵物照片</label>
                <input type="file" name="file" class="form-control" accept="image/*" onchange="previewImage(event)">
                <div class="mt-2">
                    <img id="preview" src="#" alt="預覽" style="max-width:200px; display:none;">
                </div>
            </div>

            <button type="submit" class="btn btn-success">新增</button>
        </form>
    </section>

    <script>
        function previewImage(event) {
            const preview = document.getElementById('preview');
            preview.src = URL.createObjectURL(event.target.files[0]);
            preview.style.display = 'block';
        }
    </script>
</body>

</html>
