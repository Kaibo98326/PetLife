<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetLife | 寵物美容預約</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/ShopPanel.css?v=124}">
    <link rel="stylesheet" th:href="@{/css/frontBeautyBooking.css}">
</head>
<body>

<header class="shop-header sticky-top">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-auto">
                <a th:href="@{/shop/index}" class="shop-logo">
                    <img th:src="@{/images/logo01.png}" alt="PetLife Logo">
                </a>
            </div>

            <div class="col px-lg-5">
                <form th:action="@{/shop/index}" method="get" class="shop-search-form">
                    <div class="input-group">
                        <input type="text" name="keyword"
                               class="form-control search-input"
                               placeholder="搜尋毛孩好物...">
                        <button type="submit" class="btn search-submit-btn">
                            <i class="fas fa-search text-muted"></i>
                        </button>
                    </div>
                </form>
            </div>

            <div class="col-auto">
                <nav class="shop-user-nav d-flex align-items-center">
                    <a th:href="@{/api/cart/cart}"
                       class="nav-icon-item d-flex flex-column align-items-center text-decoration-none">
                        <i class="fas fa-shopping-cart"></i>
                        <span style="font-size: 13px; color: #5a4a42;">購物車</span>
                    </a>

                    <a href="#"
                       class="nav-icon-item d-flex flex-column align-items-center text-decoration-none">
                        <i class="far fa-comment-dots" style="font-size: 1.2rem; color: #666;"></i>
                        <span style="font-size: 13px; color: #5a4a42;">聊聊</span>
                    </a>

                    <div class="user-action-zone">
                        <div th:if="${memberId != null}" class="d-flex align-items-center">
                            <div class="user-greeting-box me-3 text-end">
                                <span class="welcome-tag">
                                    <i class="fas fa-paw"></i>
                                    <strong th:text="${memberName}"></strong> 你好！
                                </span>
                                <a th:href="@{/member/center}" class="member-link">會員中心</a>
                            </div>
                            <a th:href="@{/member/logout}"
                               class="nav-icon-item d-flex flex-column align-items-center text-decoration-none text-danger">
                                <i class="fas fa-sign-out-alt" style="font-size: 1.2rem;"></i>
                                <span style="font-size: 13px;">登出</span>
                            </a>
                        </div>

                        <div th:unless="${memberId != null}">
                            <a th:href="@{/loginChoice}"
                               class="nav-icon-item d-flex flex-column align-items-center text-decoration-none">
                                <i class="far fa-user-circle" style="font-size: 1.2rem; color: #666;"></i>
                                <span style="font-size: 13px; color: #5a4a42;">登入 / 註冊</span>
                            </a>
                        </div>
                    </div>
                </nav>
            </div>
        </div>

        <nav class="header-nav mt-3">
            <div class="container">
                <ul class="nav-menu-list">
                    <li><a th:href="@{/shop/index(all='true')}" class="nav-menu-link">全部商品</a></li>
                    <li><a th:href="@{/shop/index(catId=1)}" class="nav-menu-link">🐱 貓貓專區</a></li>
                    <li><a th:href="@{/shop/index(catId=2)}" class="nav-menu-link">🐶 狗狗專區</a></li>
                    <li><a th:href="@{/beauty-booking}" class="nav-menu-link active">🛁 寵物美容</a></li>
                    <li><a th:href="@{/stay/selectPet}" class="nav-menu-link">🏠 寵物旅館</a></li>
                    <li><a href="#" class="nav-menu-link">🔥 限時特惠</a></li>
                </ul>
            </div>
        </nav>
    </div>
</header>

<main class="beauty-booking-page">
    <div class="container">
        <div class="booking-wrap">
            <div class="booking-header">
                <h1>寵物美容預約</h1>
                <p>請填寫預約資料，送出後系統會依美容項目與體型自動計算價格並寫入預約紀錄。</p>
            </div>

            <div class="booking-card">
                <div class="alert alert-success"
                     th:if="${successMessage != null}"
                     th:text="${successMessage}"></div>

                <div class="alert alert-danger"
                     th:if="${errorMessage != null}"
                     th:text="${errorMessage}"></div>

                <form th:action="@{/beauty-booking}" method="post" th:object="${form}">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">會員姓名</label>
                            <input type="text" class="form-control" th:value="${member.memberName}" readonly>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">會員 Email</label>
                            <input type="text" class="form-control" th:value="${member.email}" readonly>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="petId">選擇寵物</label>
                            <select class="form-select" id="petId" th:field="*{petId}" required>
                                <option value="">請選擇寵物</option>
                                <option th:each="pet : ${petList}"
                                        th:value="${pet.petId}"
                                        th:text="|${pet.petName}（${pet.species} / ${pet.breed}）|">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="beautyId">美容項目</label>
                            <select class="form-select" id="beautyId" th:field="*{beautyId}" required>
                                <option value="">請選擇美容項目</option>
                                <option th:each="item : ${beautyItems}"
                                        th:value="${item.beautyId}"
                                        th:text="${item.itemName}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="petSize">寵物體型</label>
                            <select class="form-select" id="petSize" th:field="*{petSize}" required>
                                <option value="">請選擇體型</option>
                                <option value="小型">小型</option>
                                <option value="中型">中型</option>
                                <option value="大型">大型</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="beautyDate">預約日期</label>
                            <input type="date" class="form-control" id="beautyDate" th:field="*{beautyDate}" required>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label" for="beautySlot">美容時段</label>
                            <select class="form-select" id="beautySlot" th:field="*{beautySlot}" required>
                                <option value="">請選擇時段</option>
                                <option value="09:00-11:00">09:00 - 11:00</option>
                                <option value="11:00-13:00">11:00 - 13:00</option>
                                <option value="14:00-16:00">14:00 - 16:00</option>
                                <option value="16:00-18:00">16:00 - 18:00</option>
                            </select>
                        </div>
                    </div>

                    <div class="booking-tips">
                        <ul>
                            <li>預約建立後，狀態會自動寫入「預約中」。</li>
                            <li>系統會依美容項目與體型，自動從價格表取出 itemPrice。</li>
                            <li>只能替目前登入會員名下的寵物建立預約。</li>
                        </ul>
                    </div>

                    <div class="booking-actions">
                        <a th:href="@{/shop/index}" class="btn btn-outline-secondary">返回商城</a>
                        <button type="submit" class="btn btn-warning text-white">送出預約</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<script>
    (function () {
        const dateInput = document.getElementById('beautyDate');
        if (!dateInput) return;

        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        dateInput.min = `${yyyy}-${mm}-${dd}`;
    })();
</script>

</body>
</html>
