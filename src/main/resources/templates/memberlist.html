<div th:fragment="listFragment" class="container mt-4">

    <!-- 搜尋框 -->
    <form id="searchForm" class="d-flex mb-3" onsubmit="event.preventDefault(); searchMemberByName();">
        <input type="text" id="searchMemberName" name="memberName"
               th:value="${searchKeyword}" placeholder="輸入姓名查詢"
               class="form-control me-2">
        <button type="submit" class="btn btn-primary">搜尋</button>
    </form>

    <!-- 會員清單 -->
    <div style="overflow-x:auto;">
        <table class="table table-striped table-hover table-bordered shadow-sm" style="min-width:1000px;">
            <thead class="table-dark">
                <tr>
                    <th>會員編號</th>
                    <th>姓名</th>
                    <th>Email</th>
                    <th>電話</th>
                    <th>狀態</th>
                    <th>註冊時間</th>
                    <th>最後登入</th>
                    <th style="min-width:200px;">操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="member : ${members}">
                    <td th:text="${member.memberId}"></td>
                    <td th:text="${member.memberName}"></td>
                    <td th:text="${member.email}"></td>
                    <td th:text="${member.phone}"></td>
                    <td th:text="${member.accountStatus}"></td>
                    <td th:text="${member.registerTime != null ? #temporals.format(member.registerTime, 'yyyy-MM-dd HH:mm:ss') : ''}"></td>
                    <td th:text="${member.lastLogin != null ? #temporals.format(member.lastLogin, 'yyyy-MM-dd HH:mm:ss') : ''}"></td>
                    <td>
                        <button class="btn btn-sm btn-warning"
                                th:onclick="|toggleEdit(this, ${member.memberId})|">編輯</button>
                        <button class="btn btn-sm btn-danger ms-1"
                                th:onclick="|changePassword(${member.memberId})|">更改密碼</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 分頁控制 (保留原本結構) -->

    <script>
        // 切換編輯 / 保存
        function toggleEdit(button, memberId) {
            const row = button.closest("tr");
            const isEditing = button.textContent === "保存";

            if (!isEditing) {
                button.textContent = "保存";

                const nameCell = row.cells[1];
                const emailCell = row.cells[2];
                const phoneCell = row.cells[3];
                const statusCell = row.cells[4];

                nameCell.innerHTML = `<input type="text" class="form-control form-control-sm" value="${nameCell.textContent}">`;
                emailCell.innerHTML = `<input type="email" class="form-control form-control-sm" value="${emailCell.textContent}">`;
                phoneCell.innerHTML = `<input type="text" class="form-control form-control-sm" value="${phoneCell.textContent}">`;

                const currentStatus = statusCell.textContent.trim();
                statusCell.innerHTML = `
                    <select class="form-select form-select-sm">
                        <option value="active" ${currentStatus === 'active' ? 'selected' : ''}>active</option>
                        <option value="disable" ${currentStatus === 'disable' ? 'selected' : ''}>disable</option>
                        <option value="banned" ${currentStatus === 'banned' ? 'selected' : ''}>banned</option>
                    </select>
                `;
            } else {
                const name = row.cells[1].querySelector("input").value;
                const email = row.cells[2].querySelector("input").value;
                const phone = row.cells[3].querySelector("input").value;
                const status = row.cells[4].querySelector("select").value;

                fetch('/members/update/' + memberId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ memberName: name, email: email, phone: phone, accountStatus: status })
                }).then(response => {
                    if (response.ok) {
                        alert("更新成功");
                        row.cells[1].textContent = name;
                        row.cells[2].textContent = email;
                        row.cells[3].textContent = phone;
                        row.cells[4].textContent = status;
                        button.textContent = "編輯";
                    } else {
                        alert("更新失敗");
                    }
                });
            }
        }

        // 更改密碼
        function changePassword(memberId) {
            const newPassword = prompt("請輸入新密碼：");
            if (newPassword) {
                fetch('/members/changePassword/' + memberId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: newPassword })
                }).then(response => {
                    if (response.ok) {
                        alert("密碼已更新");
                    } else {
                        alert("更新失敗");
                    }
                });
            }
        }
    </script>
</div>
