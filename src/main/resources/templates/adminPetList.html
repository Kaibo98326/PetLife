<div id="petListContainer" th:fragment="listFragment" class="container mt-4">

    <!-- 搜尋框 -->
    <form id="searchForm" class="d-flex mb-3" onsubmit="event.preventDefault(); searchPet();">
        <select id="searchType" name="searchType" class="form-select me-2">
            <option value="name">寵物名稱</option>
            <option value="member">主人ID</option>
        </select>
        <input type="text" id="searchKeyword" name="searchKeyword"
               th:value="${searchKeyword}" placeholder="輸入關鍵字"
               class="form-control me-2">
        <button type="submit" class="btn btn-primary">搜尋</button>
    </form>

    <!-- 寵物清單 -->
    <table class="table table-striped table-hover table-bordered shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>寵物編號</th>
                <th>名稱</th>
                <th>種類</th>
                <th>主人ID</th>
                <th>圖片</th>
                <th>狀態</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="pet : ${petList}">
                <td th:text="${pet.petId}"></td>
                <td th:text="${pet.petName}"></td>
                <td th:text="${pet.species}"></td>
                <td th:text="${pet.member.memberId}"></td>
                <td><img th:src="@{'/' + ${pet.petPhoto}}" style="width:80px;"></td>
                <td>
                    <span th:text="${pet.status}"
                          th:classappend="${pet.status == 'active'} ? 'badge bg-success' :
                                          (${pet.status == 'disable'} ? 'badge bg-warning' : 'badge bg-danger')">
                    </span>
                </td>
                <td>
                    <button class="btn btn-sm btn-warning"
        						th:onclick="|editPet(${pet.petId})|">編輯</button>
                    <button class="btn btn-sm btn-danger ms-1"
                            th:onclick="|deletePet(${pet.petId})|">刪除</button>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- 分頁控制 (一般清單) -->
    <nav th:if="${searchKeyword == null}" class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:onclick="|loadPetPage(${currentPage > 0 ? currentPage - 1 : 0})|">上一頁</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link">第 <span th:text="${currentPage + 1}"></span> / <span th:text="${totalPages}"></span> 頁</span>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link"
                   th:onclick="|loadPetPage(${currentPage + 1 < totalPages ? currentPage + 1 : totalPages - 1})|">下一頁</a>
            </li>
        </ul>
    </nav>

    <!-- 分頁控制 (搜尋結果) -->
    <nav th:if="${searchKeyword != null}" class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:attr="data-keyword=${searchKeyword},data-page=${currentPage - 1}"
                   onclick="loadSearchPage(this)">上一頁</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link">第 <span th:text="${currentPage + 1}"></span> / <span th:text="${totalPages}"></span> 頁</span>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link"
                   th:attr="data-keyword=${searchKeyword},data-page=${currentPage + 1 < totalPages ? currentPage + 1 : totalPages - 1}"
                   onclick="loadSearchPage(this)">下一頁</a>
            </li>
        </ul>
    </nav>

	<script>
    function loadPetPage(page) {
        fetch('/pets/admin/list?page=' + page)
            .then(response => response.text())
            .then(html => {
                document.querySelector('#petListContainer').innerHTML = html;
            });
    }

    function loadSearchPage(element) {
        const keyword = element.getAttribute("data-keyword");
        const page = element.getAttribute("data-page");
        fetch('/pets/admin/search?petName=' + encodeURIComponent(keyword) + '&page=' + page)
            .then(response => response.text())
            .then(html => {
                document.querySelector('#petListContainer').innerHTML = html;
            });
    }

    function searchPet() {
        const keyword = document.getElementById("searchKeyword").value;
        const type = document.getElementById("searchType").value;
        if (type === "name") {
            fetch('/pets/admin/search?petName=' + encodeURIComponent(keyword) + '&page=0')
                .then(response => response.text())
                .then(html => {
                    document.querySelector('#petListContainer').innerHTML = html;
                });
        } else {
            fetch('/pets/admin/searchByMember?memberId=' + encodeURIComponent(keyword) + '&page=0')
                .then(response => response.text())
                .then(html => {
                    document.querySelector('#petListContainer').innerHTML = html;
                });
        }
    }
    function editPet(petId) {
        fetch('/pets/admin/edit/' + petId)
            .then(response => response.text())
            .then(html => {
                document.querySelector('#petListContainer').innerHTML = html;
            });
    }	
    function deletePet(petId) {
        if (confirm("確定要刪除寵物 #" + petId + " 嗎？")) {
            fetch('/pets/admin/delete/' + petId, { method: 'POST' })
                .then(response => {
                    if (response.ok) {
                        alert("寵物已標記為刪除");
                        loadPetPage(0); // 重新載入列表
                    } else {
                        alert("操作失敗");
                    }
                });
        }
    }
</script>


</div>
