<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>修改會員資料</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/MemberCenter.css}">
</head>

<body>
    <!-- Header -->
    <header>
        <div class="row align-items-center flex-nowrap">
            <div class="col-auto ps-3">
                <a th:href="@{/shop}" class="shop-logo">
                    <img th:src="@{/images/logo01.png}" alt="PetLife Logo"
                        style="height: 60px; width: auto; object-fit: contain;">
                </a>
            </div>
            <nav>
                <a th:href="@{/shop/index}">首頁</a>
                <a th:href="@{/products}">商品分類</a>
                <a th:href="@{/member/center}">會員中心</a>
                <a th:href="@{/contact}">客服</a>
            </nav>
        </div>
    </header>

    <!-- 修改會員資料表單 -->
    <section class="dashboard">
        <div class="member-info">
            <h2>修改會員資料</h2>
            <form th:action="@{/member/update}" method="post" class="form-group">

                <!-- 會員編號 (不可修改) -->
                <div class="mb-3">
                    <label for="memberId">會員編號</label>
                    <input type="text" id="memberId" name="memberId" th:value="${member.memberId}" readonly
                        class="form-control">
                </div>

                <!-- 會員名稱 -->
                <div class="mb-3">
                    <label for="memberName">會員名稱</label>
                    <input type="text" id="memberName" name="memberName" th:value="${member.memberName}" required
                        class="form-control">
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="email">電子郵件</label>
                    <input type="email" id="email" name="email" th:value="${member.email}" required
                        class="form-control">
                </div>

                <!-- 電話 -->
                <div class="mb-3">
                    <label for="phone">電話</label>
                    <input type="text" id="phone" name="phone" th:value="${member.phone}" class="form-control">
                </div>

                <!-- 地址 -->
                <div class="mb-3">
                    <label for="address">地址</label>
                    <input type="text" id="address" name="address" th:value="${member.address}" class="form-control">
                </div>
                <!-- 創建時間 (顯示但不可修改) -->
				<div class="mb-3">
    					<label for="registerTime">創建時間</label>
    					<input type="text" id="registerTime" name="registerTime"
           			th:value="${member.registerTime != null ? #temporals.format(member.registerTime, 'yyyy-MM-dd HH:mm:ss') : ''}"
           			readonly class="form-control">
				</div>

				<!-- 最後登入時間 (隱藏不可修改) -->
				<input type="hidden" id="lastLogin" name="lastLogin"
       			th:value="${member.lastLogin != null ? #temporals.format(member.lastLogin, 'yyyy-MM-dd HH:mm:ss') : ''}">


                <!-- 驗證舊密碼 -->
                <div class="mb-3">
                    <label for="oldPassword">請輸入舊密碼</label>
                    <input type="password" id="oldPassword" name="oldPassword" class="form-control">
                    <button type="button" class="btn btn-secondary mt-2" onclick="verifyPassword()">驗證</button>
                    <div id="verifyResult" class="mt-2"></div>
                </div>

                <!-- 修改密碼 (初始隱藏) -->
                <div class="mb-3" id="newPasswordBlock" style="display:none;">
                    <label for="password">新密碼</label>
                    <input type="password" id="password" name="password" class="form-control">
                </div>
                <div class="d-flex gap-2">
                    <!-- 儲存修改 -->
                    <button type="submit" class="btn btn-primary">儲存修改</button>

                    <!-- 返回會員中心 -->
                    <a th:href="@{/member/center}" class="btn btn-secondary">返回會員中心</a>
                </div>


            </form>
            <script>
                function verifyPassword() {
                    const oldPwd = document.getElementById("oldPassword").value;
                    const memberId = document.getElementById("memberId").value;

                    fetch('/member/checkPassword', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ memberId: memberId, oldPassword: oldPwd })
                    })
                        .then(res => res.json())
                        .then(data => {
                            const resultDiv = document.getElementById("verifyResult");
                            if (data.valid) {
                                resultDiv.innerHTML = "<span style='color:green;'>密碼正確 ✔</span>";
                                document.getElementById("newPasswordBlock").style.display = "block";
                            } else {
                                resultDiv.innerHTML = "<span style='color:red;'>密碼不正確 ✘</span>";
                                document.getElementById("newPasswordBlock").style.display = "none";
                            }
                        });
                }
            </script>


        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 寵物百貨</p>
        <p>客服信箱：service@petshop.com</p>
    </footer>
</body>

</html>
